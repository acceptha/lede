# `docker-compose up` 한 줄로 전체 스택 기동 (DESIGN §8 / 성공 기준 1).
# app + worker + postgres + redis.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lede}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lede}
      POSTGRES_DB: ${POSTGRES_DB:-lede}
    ports:
      # host 5432는 native PostgreSQL이 점유할 수 있어 5433으로 공개.
      # 컨테이너 내부(app/worker)는 그대로 postgres:5432로 접속한다.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lede} -d ${POSTGRES_DB:-lede}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      # 컨테이너 내부 기준 접속값 (env_file의 값보다 우선)
      DATABASE_URL: postgresql+asyncpg://lede:lede@postgres:5432/lede
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # 부트스트랩(마이그레이션+seed) → 스케줄러(별도 프로세스, 백그라운드) → arq(포그라운드)
    command:
      - sh
      - -c
      - |
        alembic upgrade head &&
        python -m app.seed &&
        (python -m app.scheduler &) &&
        exec arq app.worker.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lede:lede@postgres:5432/lede
      REDIS_URL: redis://redis:6379/0
      # 컨테이너에서 host의 Ollama 접근 (host의 localhost:11434)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:

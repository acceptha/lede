name: CI

# push·PR(main)마다 린트 + 테스트. 외부 서비스 불필요(테스트는 가짜 주입, LLM 실호출 0).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Test (unit, DB 불필요)
        run: pytest -q -m "not integration"

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lede
          POSTGRES_PASSWORD: lede
          POSTGRES_DB: lede_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lede"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Test (integration, 실 Postgres)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://lede:lede@localhost:5432/lede_test
        run: pytest -q -m integration
